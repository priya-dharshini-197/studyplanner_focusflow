<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FocusFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body {
    min-height:100vh;
    background: linear-gradient(-45deg, #a18cd1, #fbc2eb, #8ec5fc, #e0c3fc);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.dashboard {
    display: flex;
    gap: 20px;
    width: 1000px;
}

.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.6);
    padding:30px;
    border-radius:20px;
    flex: 2;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.side {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.6);
    padding:20px;
    border-radius:20px;
    flex: 1;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    text-align:center;
}

h2 {
    text-align:center;
    margin-bottom:10px;
    color:#4b2e83;
}

.subtitle {
    text-align:center;
    font-size:13px;
    color:#666;
    margin-bottom:15px;
}

.stats {
    text-align:center;
    margin-bottom:20px;
    color:#5f3dc4;
}

/* 🔥 STREAK STYLE */
.streak {
    text-align:center;
    font-weight:600;
    color:#f97316;
    margin-bottom:15px;
    font-size:16px;
}

/* Clock */
#clock {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 20px;
    color:#4b2e83;
}

form {
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap: wrap;
}

input {
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:10px;
}

input[type="date"] {
    flex: 1 100%;
}

button {
    padding:10px 15px;
    background:linear-gradient(135deg,#a855f7,#6366f1);
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

ul {
    list-style:none;
}

li {
    background:rgba(255,255,255,0.8);
    padding:12px;
    border-radius:12px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.task-text.completed {
    text-decoration: line-through;
    color: gray;
}

.deadline {
    display:block;
    font-size:12px;
    color:#777;
}

.actions a {
    margin-left: 10px;
    text-decoration: none;
    font-weight:bold;
}

.complete { color: green; }
.delete { color:#ff4d6d; }

.logout {
    display:block;
    text-align:center;
    margin-top:20px;
    color:#6d28d9;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="dashboard">

    <!-- LEFT -->
    <div class="container">
        <h2>🚀 FocusFlow</h2>
        <div class="subtitle">Track your productivity smartly</div>

        <div class="stats">
            <p>Total Tasks: {{ total }}</p>
            <p>Completed: {{ completed }}</p>
        </div>

        <!-- 🔥 STREAK DISPLAY -->
        <div class="streak">
            🔥 {{ streak }} Day Streak
        </div>

        <form action="/add" method="POST">
            <input type="text" name="task" placeholder="Enter your task..." required>
            <input type="date" name="deadline">
            <button type="submit">Add</button>
        </form>

        <ul>
            {% for task in tasks %}
            <li>
                <div>
                    <span class="task-text {% if task[2] == 1 %}completed{% endif %}">
                        {{ task[1] }}
                    </span>

                    {% if task[3] %}
                        <span class="deadline">Due: {{ task[3] }}</span>
                    {% endif %}
                </div>

                <div class="actions">
                    {% if task[2] == 0 %}
                        <a class="complete" href="/complete/{{ task[0] }}">✔</a>
                    {% endif %}
                    <a class="delete" href="/delete/{{ task[0] }}">Delete</a>
                </div>
            </li>
            {% endfor %}
        </ul>

        <a class="logout" href="/logout">Logout</a>
    </div>

    <!-- RIGHT -->
    <div class="side">

        <div id="clock"></div>

        <canvas id="taskChart"></canvas>

        <canvas id="trendChart" style="margin-top:20px;"></canvas>

    </div>

</div>

<script>
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();
</script>

<script>
new Chart(document.getElementById('taskChart'), {
    type: 'doughnut',
    data: {
        labels: ['Completed', 'Pending'],
        datasets: [{
            data: [{{ completed }}, {{ total - completed }}],
            backgroundColor: ['#22c55e', '#f43f5e']
        }]
    }
});
</script>

<script>
new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
        labels: {{ labels | tojson }},
        datasets: [{
            label: 'Tasks Completed',
            data: {{ values | tojson }},
            borderColor: '#6366f1',
            backgroundColor: 'rgba(99,102,241,0.2)',
            fill: true,
            tension: 0.4
        }]
    }
});
</script>

</body>
</html>
