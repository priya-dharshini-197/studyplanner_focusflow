<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass container */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.6);
    padding: 40px;
    border-radius: 20px;
    width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
    transition: 0.3s;
}

.container:hover {
    transform: translateY(-3px);
}

h2 {
    margin-bottom: 10px;
    color: #4b2e83;
}

/* Subtitle */
.subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 10px;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #a855f7;
    box-shadow: 0 0 6px rgba(168,85,247,0.4);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg,#a855f7,#6366f1);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(168,85,247,0.4);
}

/* Messages */
.error {
    background: #ffe5ec;
    color: #d90429;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 10px;
}

.success {
    background: #e6fffa;
    color: #0f766e;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 10px;
}

/* Footer */
p {
    margin-top: 15px;
    font-size: 14px;
    color: #555;
}

a {
    color: #6d28d9;
    text-decoration: none;
    font-weight: 500;
}

a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
    <h2>Create Account 🌸</h2>
    <div class="subtitle">Start organizing your study tasks</div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/login">Login</a></p>
</div>

</body>
</html>
